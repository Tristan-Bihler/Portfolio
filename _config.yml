title: Tristan Gregory Bihler
email: tristanbihler@gmail.com
description: >-
  Electrical Engineering & Information Technology · Data Analytics · Hiking & Travel
baseurl: "/Portfolio"
url: "https://tristan-bihler.github.io"

author:
  name: Tristan Gregory Bihler
  role: Electrical Engineer · DHBW Karlsruhe
  bio: >-
    Trained in precision engineering at the Feintechnik school, now studying
    Electrical Engineering and Information Technology at DHBW — bridging hardware
    and software, from embedded systems and microcontrollers to data analytics and
    visualisation. When I'm not debugging circuits or parsing datasets, I'm out
    hiking and travelling.

markdown: kramdown
permalink: pretty
highlighter: rouge

collections:
  projects:
    output: true
    permalink: /projects/:name/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: projects
    values:
      layout: project

plugins:
  - jekyll-feed

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
  - vendor
