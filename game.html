---
layout: default
title: TGB Arcade
permalink: /game/
---
<section class="section-game">
  <div class="container">
    <div class="section-header">
      <div>
        <p class="label">You found it</p>
        <h1 class="section-heading">TGB Arcade</h1>
      </div>
      <p class="game-tagline">21 hand-built mini games.<br>Vanilla JS, zero dependencies.</p>
    </div>

    <div class="card-grid">
      {% assign games = site.games | sort: 'order' %}
      {% for game in games %}
      <a href="{{ game.url | relative_url }}" class="post-card">
        <span class="card-label">{{ game.category }}</span>
        <h2 class="card-title">{{ game.title }}</h2>
        <p class="card-excerpt">{{ game.description }}</p>
      </a>
      {% endfor %}
    </div>
  </div>
</section>
