<footer class="site-footer">
  <div class="footer-inner">
    <div>
      <p class="footer-name">{{ site.author.name }}</p>
      <p class="footer-role">{{ site.author.role }}</p>
    </div>
    <div style="display:flex; flex-direction:column; align-items:flex-end; gap:14px;">
      <div class="footer-socials">
        <a href="#" class="footer-icon" title="Instagram">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
            <circle cx="12" cy="12" r="4"></circle>
            <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"></circle>
          </svg>
        </a>
        <a href="#" class="footer-icon" title="LinkedIn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="3"></rect>
            <line x1="7" y1="10" x2="7" y2="17"></line>
            <line x1="7" y1="7" x2="7" y2="7.5"></line>
            <path d="M11 10v7m0-4c0-2 6-2 6 1v3"></path>
          </svg>
        </a>
      </div>
      <p class="footer-copy">&copy; {{ 'now' | date: "%Y" }} &middot; Made with Jekyll</p>
    </div>
  </div>
</footer>
