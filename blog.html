---
layout: default
title: Blog
permalink: /blog/
---
<section class="section-hero-short" style="background-image: url('{{ '/assets/images/splash.jpg' | relative_url }}');">
  <div class="hero-overlay"></div>
  <div class="hero-short-content">
    <p class="label">Writing</p>
    <h1 class="hero-title">Blog</h1>
    <p class="hero-subtitle">Thoughts on engineering, data, and the outdoors.</p>
  </div>
</section>

<section class="section-content">
  <div class="container">
    <div class="card-grid">
      {% for post in site.posts %}
      <a href="{{ post.url | relative_url }}" class="project-card">
        <div class="card-top-bar"></div>
        <div class="card-body">
          <span class="card-label">{{ post.category }}</span>
          <h2 class="card-title">{{ post.title }}</h2>
          <p class="card-excerpt">{{ post.excerpt | strip_html | truncate: 140 }}</p>
          <div class="card-footer-row">
            <span class="card-date">{{ post.date | date: "%B %-d, %Y" }}</span>
            <span class="card-cta">Read →</span>
          </div>
        </div>
      </a>
      {% endfor %}
    </div>
  </div>
</section>
